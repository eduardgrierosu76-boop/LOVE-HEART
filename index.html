<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Love You Heart</title>

<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    .text {
        position: absolute;
        color: #ff2b4a;
        font-size: 14px;
        white-space: nowrap;
        pointer-events: none;
        text-shadow: 0 0 8px #ff2b4a;
        opacity: 0;
        transition: opacity 0.4s ease-out;
    }

    .floating {
        position: absolute;
        color: white;
        font-size: 22px;
        font-weight: bold;
        text-shadow: 0 0 10px white;
        transition: top 3.5s linear, opacity 1s ease-out;
        pointer-events: none;
    }
</style>
</head>

<body>

<script>
// HEART MATH
function heartFunction(t) {
    const x = 16 * Math.sin(t) ** 3;
    const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    return { x, y };
}

// SPAM HEART TEXT (dense like TikTok)
function spawnHeartText() {
    const t = Math.random() * Math.PI * 2;
    const h = heartFunction(t);

    const x = window.innerWidth / 2 + h.x * 20;
    const y = window.innerHeight / 2 - h.y * 20;

    createText(x, y, "i love you");
}

// RANDOM SPAM TEXT (fills the screen)
function spawnRandomText() {
    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight;

    createText(x, y, "i love you");
}

// CREATE TEXT ELEMENT
function createText(x, y, content) {
    const el = document.createElement("div");
    el.className = "text";
    el.style.left = x + "px";
    el.style.top = y + "px";
    el.textContent = content;

    document.body.appendChild(el);

    setTimeout(() => { el.style.opacity = "1"; }, 10);
    setTimeout(() => { el.style.opacity = "0"; }, 1500);
    setTimeout(() => { el.remove(); }, 2500);
}

function spawnFloatingMessage() {
